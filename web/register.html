<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create account · todo-go</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/auth.css" />
</head>
<body>
  <div class="auth">
    <h1>todo-go</h1>
    <p class="sub">Create your account</p>
    <div class="card">
      <form id="register-form">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required minlength="3" maxlength="32" pattern="[a-z0-9_-]+" />
        <p class="hint">3–32 chars, lowercase letters, digits, <code>_</code> or <code>-</code></p>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required minlength="8" />
        <p class="hint">At least 8 characters</p>
        <button type="submit" id="submit">Create account</button>
        <div class="error" id="error"></div>
      </form>
    </div>
    <p class="switch">Already have one? <a href="/login">Sign in</a></p>
  </div>

  <script>
    const form = document.getElementById("register-form");
    const errorEl = document.getElementById("error");
    const submitEl = document.getElementById("submit");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.textContent = "";
      submitEl.disabled = true;
      try {
        const res = await fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
          }),
        });
        if (res.ok) {
          window.location.href = "/";
        } else {
          const msg = (await res.text()).trim() || "Registration failed";
          errorEl.textContent = msg;
        }
      } catch (err) {
        errorEl.textContent = "Network error";
      } finally {
        submitEl.disabled = false;
      }
    });
  </script>
</body>
</html>
