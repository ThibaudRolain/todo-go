# fly.toml — Fly.io configuration for todo-go
# Run `fly launch --copy-config` once to register the app; then `fly deploy`.

app = "todo-go-thibaud"            # must be globally unique; change if taken
primary_region = "cdg"             # Paris; closest to France

[build]
  dockerfile = "Dockerfile"

[env]
  TODO_GO_DATA = "/data/tasks.json"
  TODO_GO_ADDR = "0.0.0.0:8080"

[[mounts]]
  source = "todo_go_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
